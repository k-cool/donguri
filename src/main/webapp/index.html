<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Donguri Animation</title>
    <style>
        /* 배경 설정: 보내주신 이미지의 느낌을 유지 */
        .donguri-ani {
            width: 100%;
            height: 100vh; /* 화면 꽉 차게 */
            background: url('image/background.png') no-repeat center center; /* 배경 이미지 경로 */
            background-size: cover;
            position: relative;
            overflow: hidden;
            background-color: #fdf5e6; /* 이미지 로딩 전 대비용 */
        }

        /* 도토리 스타일 */
        .dong {
            width: 50px;
            position: absolute;
            z-index: 10;
        }

        /* 우체통 스타일 */
        .postbox {
            width: 120px; /* 이미지에 맞춰 조절 */
            position: absolute;
            bottom: 50px; /* 바닥 언덕 위치에 맞춰 조절 */
            left: 50%;
            transform: translateX(-50%);
        }

        /* 구름 스타일 */
        .cloud {
            position: absolute;
            font-size: 50px;
            opacity: 0.8;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="donguri-ani" id="scene">
    <img id="acorn" class="dong" src="image/acon.png" alt="도토리"/>
    <img id="postbox" class="postbox" src="image/postbox.png" alt="우체통"/>
</div>

<script>
    const acorn = document.getElementById("acorn");
    const postbox = document.getElementById("postbox");
    const scene = document.getElementById("scene");

    // 초기 설정
    let x = scene.clientWidth / 2 - 25; // 중앙 시작
    let y = 100;
    let vx = 0;
    let vy = 0;
    let angle = 0;

    const gravity = 0.25;
    const bounce = 0.5;
    let phase = "sky"; // sky -> fall -> bounce -> stop
    let startTime = Date.now();
    let cloudsVisible = true;

    // ☁️ 1. 구름 생성 (솔방울 제외, 도토리 컨셉만 유지)
    const clouds = [];
    for (let i = 0; i < 8; i++) {
        const el = document.createElement("div");
        el.className = "cloud";
        el.innerText = "☁️";
        scene.appendChild(el);
        clouds.push({
            el: el,
            x: Math.random() * scene.clientWidth,
            y: Math.random() * scene.clientHeight,
            speed: 2 + Math.random() * 3
        });
    }

    function hideClouds() {
        if (!cloudsVisible) return;
        cloudsVisible = false;
        document.querySelectorAll('.cloud').forEach(c => {
            c.style.opacity = "0";
            setTimeout(() => c.remove(), 500);
        });
    }

    function animate() {
        const now = Date.now();
        const elapsed = (now - startTime) / 1000;

        // --- 구름 이동 ---
        if (cloudsVisible) {
            clouds.forEach(c => {
                c.y -= c.speed;
                if (c.y < -100) {
                    c.y = scene.clientHeight + 50;
                    c.x = Math.random() * scene.clientWidth;
                }
                c.el.style.transform = `translate(${c.x}px, ${c.y}px)`;
            });
        }

        // --- 물리 및 충돌 로직 ---
        const rect = postbox.getBoundingClientRect();
        const parentRect = scene.getBoundingClientRect();
        const boxLeft = rect.left - parentRect.left;
        const boxTop = rect.top - parentRect.top;
        const boxRight = boxLeft + rect.width;
        const floor = scene.clientHeight - 80; // 바닥 언덕 높이 고려

        if (phase === "sky") {
            // 하늘에서 살랑살랑 흔들리는 연출
            y = 100 + Math.sin(elapsed * 5) * 10;
            angle = Math.sin(elapsed * 8) * 15;

            if (elapsed > 2.5) { // 2.5초 후 낙하 시작
                phase = "fall";
                hideClouds();
            }
        } else if (phase === "fall" || phase === "bounce") {
            vy += gravity;
            y += vy;
            x += vx;
            angle += vx * 2; // 이동 방향에 따라 회전

            // 1. 우체통 윗면 충돌 감지 (핵심🔥)
            const hitTop =
                y + 50 >= boxTop &&
                y + 50 <= boxTop + 25 &&
                x + 50 > boxLeft &&
                x < boxRight;

            if (hitTop && vy > 0) {
                y = boxTop - 50;
                vy *= -bounce;
                vx = 4; // 오른쪽으로 튕겨나감
                phase = "bounce";
            }

            // 2. 바닥 충돌
            if (y > floor) {
                y = floor;
                vy *= -0.4; // 바닥은 덜 튕기게
                vx *= 0.7; // 마찰력
                if (Math.abs(vy) < 1) phase = "stop";
            }

            // 3. 화면 좌우 벽 충돌
            if (x < 0 || x > scene.clientWidth - 50) {
                vx *= -0.8;
            }
        }

        // --- 렌더링 ---
        acorn.style.transform = `translate(${x}px, ${y}px) rotate(${angle}deg)`;

        if (phase !== "stop") {
            requestAnimationFrame(animate);
        }
    }

    animate();
</script>
</body>
</html>
